<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 Course Mates Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    text-align:center;
    padding:20px;
}

h1{
    color:#333;
    margin-bottom:10px;
}

p{
    margin-bottom:25px;
    color:#666;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.gallery img{
    width:220px;
    height:280px;
    object-fit:cover;
    border-radius:15px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.gallery img:hover{
    transform:scale(1.08);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* Popup Viewer */
.viewer{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.viewer img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    animation:zoomIn .4s ease;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

@keyframes zoomIn{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<h1>🎓 Course Mates Gallery</h1>
<p>Click any photo to view it in large size.</p>

<div class="gallery">
    <img src="mate1.jpg" onclick="openImage(this.src)">
    <img src="mate2.jpg" onclick="openImage(this.src)">
    <img src="mate3.jpg" onclick="openImage(this.src)">
    <img src="mate4.jpg" onclick="openImage(this.src)">
    <img src="mate5.jpg" onclick="openImage(this.src)">
    <img src="mate6.jpg" onclick="openImage(this.src)">
    <img src="mate7.jpg" onclick="openImage(this.src)">
</div>

<div class="viewer" id="viewer">
    <span class="close" onclick="closeImage()">&times;</span>
    <img id="largeImage">
</div>

<script>
function openImage(src){
    document.getElementById("viewer").style.display="flex";
    document.getElementById("largeImage").src=src;
}

function closeImage(){
    document.getElementById("viewer").style.display="none";
}

document.getElementById("viewer").addEventListener("click", function(e){
    if(e.target===this){
        closeImage();
    }
});
</script>

</body>
</html>
